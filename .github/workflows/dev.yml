name: Dev build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or commit to build (default: main)"
        required: false
        default: "main"
        type: string

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    container: debian:bookworm
    steps:
      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            curl ca-certificates git build-essential \
            pkg-config libasound2-dev libdbus-1-dev

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || 'main' }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates

      - name: Build
        run: cd crates && cargo build --release -p qbzd --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist
          cp crates/target/${{ matrix.target }}/release/qbzd dist/qbzd-linux-${{ matrix.arch }}

      - uses: actions/upload-artifact@v7
        with:
          name: qbzd-linux-${{ matrix.arch }}
          path: dist/qbzd-linux-${{ matrix.arch }}
          retention-days: 7
