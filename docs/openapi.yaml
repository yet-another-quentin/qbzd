openapi: 3.1.0
info:
  title: qbzd API
  description: |
    REST API exposed by the qbzd headless daemon on port 8182 (configurable).

    ## Authentication

    All endpoints except `/api/ping` require an API token:

    - Header: `X-API-Key: <token>`
    - Header: `Authorization: Bearer <token>`
    - Query parameter: `?token=<token>`

    The token is set in `qbzd.toml` (`server.token`). If set to `"auto"`, a
    random token is generated at startup and printed to stdout.

  version: "0.1.0"

servers:
  - url: http://localhost:8182

tags:
  - name: system
  - name: auth
  - name: playback
  - name: queue
  - name: search
  - name: catalog
  - name: audio
  - name: favorites
  - name: playlists
  - name: discover
  - name: library
  - name: integrations

paths:

  # ── System ───────────────────────────────────────────────────────────────────

  /api/ping:
    get:
      tags: [system]
      summary: Health check (no auth required)
      responses:
        "200":
          description: Daemon is up

  /api/status:
    get:
      tags: [system]
      summary: Daemon status
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  logged_in:    { type: boolean }
                  qconnect:     { type: boolean }
                  state:        { type: string, enum: [idle, ready, playing, paused] }
                  track_id:     { type: integer, nullable: true }

  /api/info:
    get:
      tags: [system]
      summary: Daemon build info
      responses:
        "200":
          description: OK

  /api/events:
    get:
      tags: [system]
      summary: Server-Sent Events stream (playback and state changes)
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /api/system/resources:
    get:
      tags: [system]
      summary: Memory and CPU usage
      responses:
        "200":
          description: OK

  /api/cache:
    delete:
      tags: [system]
      summary: Clear audio cache
      responses:
        "200":
          description: Cache cleared

  # ── Auth ─────────────────────────────────────────────────────────────────────

  /api/auth/oauth/start:
    post:
      tags: [auth]
      summary: Start OAuth login flow
      parameters:
        - name: callback_host
          in: query
          description: "Public base URL for the callback, e.g. http://192.168.1.10:8182"
          schema: { type: string }
      responses:
        "200":
          description: OAuth URLs
          content:
            application/json:
              schema:
                type: object
                properties:
                  oauth_url:    { type: string, description: "Open in browser" }
                  callback_url: { type: string, description: "Callback handled by daemon" }

  /api/auth/oauth/callback:
    get:
      tags: [auth]
      summary: OAuth redirect handler (called by Qobuz after login)
      parameters:
        - name: code_autorisation
          in: query
          schema: { type: string }
        - name: code
          in: query
          schema: { type: string }
        - name: error
          in: query
          schema: { type: string }
      responses:
        "200":
          description: HTML confirmation page

  /api/auth/oauth/status:
    get:
      tags: [auth]
      summary: Poll OAuth login status
      responses:
        "200":
          description: Current status
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      status: { type: string, enum: [idle, pending, success] }
                  - type: object
                    properties:
                      status:  { type: string, enum: [error] }
                      message: { type: string }

  /api/auth/token:
    post:
      tags: [auth]
      summary: Authenticate with a direct Qobuz user_auth_token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  display_name: { type: string }
        "400":
          description: Token validation failed

  # ── Playback ─────────────────────────────────────────────────────────────────

  /api/playback:
    get:
      tags: [playback]
      summary: Current playback state
      responses:
        "200":
          description: OK

  /api/playback/play:
    post:
      tags: [playback]
      summary: Resume playback
      responses:
        "200":
          description: OK

  /api/playback/play-track:
    post:
      tags: [playback]
      summary: Play a specific track by ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [track_id]
              properties:
                track_id: { type: integer }
      responses:
        "200":
          description: OK

  /api/playback/play-album:
    post:
      tags: [playback]
      summary: Play an album by ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [album_id]
              properties:
                album_id:    { type: string }
                track_index: { type: integer, default: 0 }
      responses:
        "200":
          description: OK

  /api/playback/pause:
    post:
      tags: [playback]
      summary: Pause playback
      responses:
        "200":
          description: OK

  /api/playback/stop:
    post:
      tags: [playback]
      summary: Stop playback
      responses:
        "200":
          description: OK

  /api/playback/next:
    post:
      tags: [playback]
      summary: Skip to next track
      responses:
        "200":
          description: OK

  /api/playback/previous:
    post:
      tags: [playback]
      summary: Skip to previous track
      responses:
        "200":
          description: OK

  /api/playback/seek:
    post:
      tags: [playback]
      summary: Seek to position
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [position_ms]
              properties:
                position_ms: { type: integer }
      responses:
        "200":
          description: OK

  /api/playback/volume:
    post:
      tags: [playback]
      summary: Set volume
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [volume]
              properties:
                volume: { type: number, minimum: 0, maximum: 1 }
      responses:
        "200":
          description: OK

  # ── Queue ─────────────────────────────────────────────────────────────────────

  /api/queue:
    get:
      tags: [queue]
      summary: Get current queue
      responses:
        "200":
          description: OK

  /api/queue/set:
    post:
      tags: [queue]
      summary: Replace the queue with a list of track IDs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [track_ids]
              properties:
                track_ids:   { type: array, items: { type: integer } }
                start_index: { type: integer, default: 0 }
      responses:
        "200":
          description: OK

  /api/queue/add:
    post:
      tags: [queue]
      summary: Append track(s) to the queue
      responses:
        "200":
          description: OK

  /api/queue/add-next:
    post:
      tags: [queue]
      summary: Insert track(s) after the current position
      responses:
        "200":
          description: OK

  /api/queue/play-index:
    post:
      tags: [queue]
      summary: Jump to a specific queue index
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [index]
              properties:
                index: { type: integer }
      responses:
        "200":
          description: OK

  /api/queue/remove:
    post:
      tags: [queue]
      summary: Remove a track from the queue
      responses:
        "200":
          description: OK

  /api/queue/move:
    post:
      tags: [queue]
      summary: Move a track to a different position
      responses:
        "200":
          description: OK

  /api/queue/clear:
    post:
      tags: [queue]
      summary: Clear the queue
      responses:
        "200":
          description: OK

  /api/queue/shuffle:
    post:
      tags: [queue]
      summary: Set shuffle mode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
      responses:
        "200":
          description: OK

  /api/queue/repeat:
    post:
      tags: [queue]
      summary: Set repeat mode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode: { type: string, enum: [off, track, queue] }
      responses:
        "200":
          description: OK

  # ── Search ────────────────────────────────────────────────────────────────────

  /api/search:
    get:
      tags: [search]
      summary: Search Qobuz catalog
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
        - name: type
          in: query
          schema: { type: string, enum: [all, tracks, albums, artists, playlists] }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Search results

  # ── Catalog ───────────────────────────────────────────────────────────────────

  /api/albums/{id}:
    get:
      tags: [catalog]
      summary: Get album details
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK

  /api/tracks/{id}:
    get:
      tags: [catalog]
      summary: Get track details
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK

  /api/tracks/batch:
    get:
      tags: [catalog]
      summary: Get multiple tracks by IDs
      parameters:
        - name: ids
          in: query
          required: true
          schema: { type: string, description: "Comma-separated track IDs" }
      responses:
        "200":
          description: OK

  /api/artists/{id}/page:
    get:
      tags: [catalog]
      summary: Artist page (bio, albums, similar)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK

  /api/artists/{id}/similar:
    get:
      tags: [catalog]
      summary: Similar artists
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK

  /api/labels/{id}:
    get:
      tags: [catalog]
      summary: Label details
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK

  /api/labels/{id}/page:
    get:
      tags: [catalog]
      summary: Label page with releases
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK

  /api/labels/explore:
    get:
      tags: [catalog]
      summary: Explore labels
      responses:
        "200":
          description: OK

  /api/playlist-tags:
    get:
      tags: [catalog]
      summary: Available playlist genre tags
      responses:
        "200":
          description: OK

  # ── Audio ─────────────────────────────────────────────────────────────────────

  /api/audio/settings:
    get:
      tags: [audio]
      summary: Get audio settings
      responses:
        "200":
          description: OK
    patch:
      tags: [audio]
      summary: Update audio settings
      responses:
        "200":
          description: OK

  /api/audio/backends:
    get:
      tags: [audio]
      summary: List available audio backends
      responses:
        "200":
          description: OK

  /api/audio/devices:
    get:
      tags: [audio]
      summary: List audio output devices
      responses:
        "200":
          description: OK

  /api/audio/hardware-status:
    get:
      tags: [audio]
      summary: DAC and hardware status
      responses:
        "200":
          description: OK

  # ── Favorites ─────────────────────────────────────────────────────────────────

  /api/favorites:
    get:
      tags: [favorites]
      summary: Get favorites
      parameters:
        - name: type
          in: query
          schema: { type: string, enum: [albums, artists, tracks] }
      responses:
        "200":
          description: OK
    post:
      tags: [favorites]
      summary: Add to favorites
      responses:
        "200":
          description: OK
    delete:
      tags: [favorites]
      summary: Remove from favorites
      responses:
        "200":
          description: OK

  # ── Playlists ─────────────────────────────────────────────────────────────────

  /api/playlists:
    get:
      tags: [playlists]
      summary: List user playlists
      responses:
        "200":
          description: OK
    post:
      tags: [playlists]
      summary: Create a playlist
      responses:
        "200":
          description: OK

  /api/playlists/search:
    get:
      tags: [playlists]
      summary: Search public playlists
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK

  /api/playlists/{id}:
    get:
      tags: [playlists]
      summary: Get playlist details
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
    put:
      tags: [playlists]
      summary: Update playlist metadata
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
    delete:
      tags: [playlists]
      summary: Delete playlist
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK

  /api/playlists/{id}/tracks:
    post:
      tags: [playlists]
      summary: Add tracks to playlist
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
    delete:
      tags: [playlists]
      summary: Remove tracks from playlist
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK

  # ── Discover ──────────────────────────────────────────────────────────────────

  /api/discover:
    get:
      tags: [discover]
      summary: Qobuz editorial homepage
      responses:
        "200":
          description: OK

  /api/discover/playlists:
    get:
      tags: [discover]
      summary: Featured playlists
      responses:
        "200":
          description: OK

  /api/discover/featured:
    get:
      tags: [discover]
      summary: Featured releases
      responses:
        "200":
          description: OK

  /api/genres:
    get:
      tags: [discover]
      summary: Available genres
      responses:
        "200":
          description: OK

  # ── Library ───────────────────────────────────────────────────────────────────

  /api/library/albums:
    get:
      tags: [library]
      summary: Local library albums
      responses:
        "200":
          description: OK

  /api/library/artists:
    get:
      tags: [library]
      summary: Local library artists
      responses:
        "200":
          description: OK

  /api/library/albums/{key}/tracks:
    get:
      tags: [library]
      summary: Tracks for a local album
      parameters:
        - name: key
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK

  /api/library/search:
    get:
      tags: [library]
      summary: Search local library
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK

  /api/library/stats:
    get:
      tags: [library]
      summary: Local library statistics
      responses:
        "200":
          description: OK

  /api/library/folders:
    get:
      tags: [library]
      summary: Watched folders
      responses:
        "200":
          description: OK
    post:
      tags: [library]
      summary: Add a watched folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path: { type: string }
      responses:
        "200":
          description: OK
    delete:
      tags: [library]
      summary: Remove a watched folder
      responses:
        "200":
          description: OK

  /api/library/scan:
    post:
      tags: [library]
      summary: Trigger library rescan
      responses:
        "200":
          description: Scan started

  # ── Integrations ──────────────────────────────────────────────────────────────

  /api/integrations/listenbrainz:
    get:
      tags: [integrations]
      summary: ListenBrainz connection status
      responses:
        "200":
          description: OK
    delete:
      tags: [integrations]
      summary: Disconnect ListenBrainz
      responses:
        "200":
          description: OK

  /api/integrations/listenbrainz/connect:
    post:
      tags: [integrations]
      summary: Connect ListenBrainz with user token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        "200":
          description: OK

  /api/integrations/lastfm:
    get:
      tags: [integrations]
      summary: Last.fm connection status
      responses:
        "200":
          description: OK
