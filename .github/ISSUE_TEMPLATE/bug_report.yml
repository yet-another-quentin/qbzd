name: Bug report
description: Report something that is not working as expected
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the problem.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: qbzd version
      placeholder: e.g. v0.2.0 or git SHA
    validations:
      required: true

  - type: dropdown
    id: install
    attributes:
      label: Installation method
      options:
        - Docker
        - Binary (built from source)
        - Binary (GitHub release)
    validations:
      required: true

  - type: input
    id: host
    attributes:
      label: Host OS / distribution
      placeholder: e.g. Debian 12, Ubuntu 24.04, ProxMox 8

  - type: dropdown
    id: audio_backend
    attributes:
      label: Audio backend
      options:
        - PipeWire
        - ALSA
        - PulseAudio

  - type: input
    id: audio_device
    attributes:
      label: Audio device / DAC
      placeholder: e.g. Schiit Modi 3, onboard HDA

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Run with `--log-level debug` and paste the relevant output.
        In Docker: `docker logs qbzd`
