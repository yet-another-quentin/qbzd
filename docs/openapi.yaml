openapi: 3.1.0
info:
  title: qbzd API
  description: |
    REST API exposed by the qbzd headless daemon on port 8182 (configurable).

    ## Authentication

    All endpoints except `/api/ping` require an API token:

    - Header: `X-API-Key: <token>`
    - Header: `Authorization: Bearer <token>`
    - Query parameter: `?token=<token>`

    The token is set in `qbzd.toml` (`server.token`). If set to `"auto"`, a
    random token is generated at startup and printed to stdout.

  version: "0.1.0"

servers:
  - url: http://localhost:8182

tags:
  - name: system
  - name: auth
  - name: playback
  - name: queue
  - name: audio

paths:

  # ── System ───────────────────────────────────────────────────────────────────

  /api/ping:
    get:
      tags: [system]
      summary: Health check (no auth required)
      responses:
        "200":
          description: Daemon is up

  /api/status:
    get:
      tags: [system]
      summary: Daemon status
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  logged_in:  { type: boolean }
                  qconnect:   { type: boolean }
                  state:      { type: string, enum: [idle, ready, playing, paused] }
                  track_id:   { type: integer, nullable: true }

  /api/info:
    get:
      tags: [system]
      summary: Daemon build info
      responses:
        "200":
          description: OK

  /api/events:
    get:
      tags: [system]
      summary: Server-Sent Events stream (playback and state changes)
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /api/system/resources:
    get:
      tags: [system]
      summary: Memory and CPU usage
      responses:
        "200":
          description: OK

  /api/cache:
    delete:
      tags: [system]
      summary: Clear audio cache
      responses:
        "200":
          description: Cache cleared

  # ── Auth ─────────────────────────────────────────────────────────────────────

  /api/auth/oauth/start:
    post:
      tags: [auth]
      summary: Start OAuth login flow
      parameters:
        - name: callback_host
          in: query
          description: "Public base URL for the callback, e.g. http://192.168.1.10:8182"
          schema: { type: string }
      responses:
        "200":
          description: OAuth URLs
          content:
            application/json:
              schema:
                type: object
                properties:
                  oauth_url:    { type: string, description: "Open in browser" }
                  callback_url: { type: string, description: "Callback handled by daemon" }

  /api/auth/oauth/callback:
    get:
      tags: [auth]
      summary: OAuth redirect handler (called by Qobuz after login)
      parameters:
        - name: code_autorisation
          in: query
          schema: { type: string }
        - name: code
          in: query
          schema: { type: string }
        - name: error
          in: query
          schema: { type: string }
      responses:
        "200":
          description: HTML confirmation page

  /api/auth/oauth/status:
    get:
      tags: [auth]
      summary: Poll OAuth login status
      responses:
        "200":
          description: Current status
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      status: { type: string, enum: [idle, pending, success] }
                  - type: object
                    properties:
                      status:  { type: string, enum: [error] }
                      message: { type: string }

  /api/auth/token:
    post:
      tags: [auth]
      summary: Authenticate with a direct Qobuz user_auth_token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  display_name: { type: string }
        "400":
          description: Token validation failed

  # ── Playback ─────────────────────────────────────────────────────────────────

  /api/playback:
    get:
      tags: [playback]
      summary: Current playback state
      responses:
        "200":
          description: OK

  /api/playback/play:
    post:
      tags: [playback]
      summary: Resume playback
      responses:
        "200":
          description: OK

  /api/playback/pause:
    post:
      tags: [playback]
      summary: Pause playback
      responses:
        "200":
          description: OK

  /api/playback/stop:
    post:
      tags: [playback]
      summary: Stop playback
      responses:
        "200":
          description: OK

  /api/playback/next:
    post:
      tags: [playback]
      summary: Skip to next track
      responses:
        "200":
          description: OK

  /api/playback/previous:
    post:
      tags: [playback]
      summary: Skip to previous track
      responses:
        "200":
          description: OK

  /api/playback/seek:
    post:
      tags: [playback]
      summary: Seek to position
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [position_ms]
              properties:
                position_ms: { type: integer }
      responses:
        "200":
          description: OK

  /api/playback/volume:
    post:
      tags: [playback]
      summary: Set volume
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [volume]
              properties:
                volume: { type: number, minimum: 0, maximum: 1 }
      responses:
        "200":
          description: OK

  # ── Queue ─────────────────────────────────────────────────────────────────────

  /api/queue:
    get:
      tags: [queue]
      summary: Get current queue
      responses:
        "200":
          description: OK

  /api/queue/set:
    post:
      tags: [queue]
      summary: Replace the queue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [track_ids]
              properties:
                track_ids:   { type: array, items: { type: integer } }
                start_index: { type: integer, default: 0 }
      responses:
        "200":
          description: OK

  /api/queue/add:
    post:
      tags: [queue]
      summary: Append track(s) to the queue
      responses:
        "200":
          description: OK

  /api/queue/add-next:
    post:
      tags: [queue]
      summary: Insert track(s) after the current position
      responses:
        "200":
          description: OK

  /api/queue/play-index:
    post:
      tags: [queue]
      summary: Jump to a specific queue index
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [index]
              properties:
                index: { type: integer }
      responses:
        "200":
          description: OK

  /api/queue/remove:
    post:
      tags: [queue]
      summary: Remove a track from the queue
      responses:
        "200":
          description: OK

  /api/queue/move:
    post:
      tags: [queue]
      summary: Move a track to a different position
      responses:
        "200":
          description: OK

  /api/queue/clear:
    post:
      tags: [queue]
      summary: Clear the queue
      responses:
        "200":
          description: OK

  /api/queue/shuffle:
    post:
      tags: [queue]
      summary: Set shuffle mode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
      responses:
        "200":
          description: OK

  /api/queue/repeat:
    post:
      tags: [queue]
      summary: Set repeat mode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode: { type: string, enum: [off, track, queue] }
      responses:
        "200":
          description: OK

  # ── Audio ─────────────────────────────────────────────────────────────────────

  /api/audio/settings:
    get:
      tags: [audio]
      summary: Get audio settings
      responses:
        "200":
          description: OK
    patch:
      tags: [audio]
      summary: Update audio settings
      responses:
        "200":
          description: OK

  /api/audio/backends:
    get:
      tags: [audio]
      summary: List available audio backends
      responses:
        "200":
          description: OK

  /api/audio/devices:
    get:
      tags: [audio]
      summary: List audio output devices
      responses:
        "200":
          description: OK

  /api/audio/hardware-status:
    get:
      tags: [audio]
      summary: DAC and hardware status
      responses:
        "200":
          description: OK
