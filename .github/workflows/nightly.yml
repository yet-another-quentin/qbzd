name: Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or commit to build (default: main)"
        required: false
        default: "main"
        type: string

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || 'main' }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libasound2-dev libdbus-1-dev

      - name: Build
        run: cd crates && cargo build --release -p qbzd --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist
          cp crates/target/${{ matrix.target }}/release/qbzd dist/qbzd-linux-${{ matrix.arch }}

      - uses: actions/upload-artifact@v7
        with:
          name: qbzd-linux-${{ matrix.arch }}
          path: dist/qbzd-linux-${{ matrix.arch }}

  publish:
    needs: build-linux
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Update nightly release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          name: Nightly
          prerelease: true
          body: |
            Automated nightly build from `main` — ${{ github.sha }}

            > Not intended for production use. Use a tagged release instead.
          files: dist/*

  docker:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || 'main' }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/qbzd:nightly
          cache-from: type=gha
          cache-to: type=gha,mode=max
